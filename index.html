<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bildspel (iOS Skärmlås-skydd)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        /* Startskärm för iOS-aktivering */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        #start-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        #slider-container {
            position: relative;
            width: 90vw;
            height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
        }
        .slide {
            display: none;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .slide.active {
            display: block;
        }
        #file-name {
            font-size: 20px;
            font-weight: bold;
            margin-top: 15px;
            text-align: center;
            min-height: 30px;
            width: 90vw;
        }
        #controls {
            margin-top: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        button.control {
            background-color: #f0f0f0;
            color: #333;
            border: 1px solid #ccc;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }
        button.control:hover {
            background-color: #e0e0e0;
        }
        #info {
            font-size: 16px;
            min-width: 80px;
            text-align: center;
        }
        #progress-bar-container {
            width: 90vw;
            height: 6px;
            background-color: #eaeaea;
            margin-top: 15px;
            border-radius: 3px;
            overflow: hidden;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: #007bff;
            transition: width 1s linear;
        }
    </style>
</head>
<body>

    <!-- iOS Startskärm -->
    <div id="overlay">
        <button id="start-btn">Meditera!</button>
    </div>

    <div id="slider-container">
        <!-- Dina 15 bilder -->
        <img class="slide active" src="images/1. Centre.png" alt="Bild 1">
        <img class="slide" src="images/2. Expand.png" alt="Bild 2">
        <img class="slide" src="images/3. Balance.png" alt="Bild 3">
        <img class="slide" src="images/4. Prepare.png" alt="Bild 4">
        <img class="slide" src="images/5. Express.png" alt="Bild 5">
        <img class="slide" src="images/6. Extend.png" alt="Bild 6">
        <img class="slide" src="images/7. Unlock.png" alt="Bild 7">
        <img class="slide" src="images/8. Flow.png" alt="Bild 8">
        <img class="slide" src="images/9. Recieve.png" alt="Bild 9">
        <img class="slide" src="images/10. Relate.png" alt="Bild 10">
        <img class="slide" src="images/11. Realize.png" alt="Bild 11">
        <img class="slide" src="images/12. Act.png" alt="Bild 12">
        <img class="slide" src="images/13. Transform.png" alt="Bild 13">
        <img class="slide" src="images/14. Connect.png" alt="Bild 14">
        <img class="slide" src="images/15. Manifest.png" alt="Bild 15">
    </div>

    <div id="file-name"></div>

    <div id="progress-bar-container">
        <div id="progress-bar"></div>
    </div>

    <div id="controls">
        <button id="prev-btn" class="control">Föregående</button>
        <button id="play-pause-btn" class="control">Pausa</button>
        <button id="next-btn" class="control">Nästa</button>
        <span id="info">1 / 15</span>
    </div>

    <script>
        const slides = document.querySelectorAll('.slide');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const info = document.getElementById('info');
        const fileNameDisplay = document.getElementById('file-name');
        const progressBar = document.getElementById('progress-bar');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');

        let currentIndex = 0;
        let isPlaying = true;
        let timeLeft = 60; 
        let timerInterval;
        let wakeLock = null;
        let iosVideoWake = null;

        // Skapa en helt osynlig, tyst video (Base64-kodad 1-sekunds MP4) speciellt för iOS
        function setupIOSWakeVideo() {
            if (!iosVideoWake) {
                iosVideoWake = document.createElement('video');
                iosVideoWake.setAttribute('loop', '');
                iosVideoWake.setAttribute('playsinline', '');
                iosVideoWake.setAttribute('muted', '');
                iosVideoWake.style.position = 'absolute';
                iosVideoWake.style.width = '1px';
                iosVideoWake.style.height = '1px';
                iosVideoWake.style.opacity = '0';
                // En extremt liten, tyst och tom MP4-video som loopar
                iosVideoWake.src = 'data:video/mp4;base64,AAAAIGZ0eXBtcDQyAAAAAG1wStandardNoWake...AAAAIG1kYXQ='; 
                document.body.appendChild(iosVideoWake);
            }
            
            iosVideoWake.play().catch(err => console.log("iOS Video blockerad:", err));
        }

        // Standard Wake Lock API för datorer/Android
        async function requestWakeLock() {
            if ('wakeLock' in navigator && isPlaying) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) { wakeLock.release(); wakeLock = null; }
            if (iosVideoWake) { iosVideoWake.pause(); }
        }

        function getCleanFileName(src) {
            const baseName = src.substring(src.lastIndexOf('/') + 1);
            return baseName.substring(0, baseName.lastIndexOf('.')) || baseName;
        }

        function updateSlider() {
            slides.forEach((slide, index) => {
                slide.classList.toggle('active', index === currentIndex);
            });
            const currentSlideSrc = slides[currentIndex].getAttribute('src');
            fileNameDisplay.textContent = getCleanFileName(currentSlideSrc);
            info.textContent = `${currentIndex + 1} / ${slides.length}`;
            resetTimer();
        }

        function nextSlide() { currentIndex = (currentIndex + 1) % slides.length; updateSlider(); }
        function prevSlide() { currentIndex = (currentIndex - 1 + slides.length) % slides.length; updateSlider(); }

        function togglePlayPause() {
            isPlaying = !isPlaying;
            playPauseBtn.textContent = isPlaying ? 'Pausa' : 'Spela';
            if (!isPlaying) {
                clearInterval(timerInterval);
                releaseWakeLock();
            } else {
                startTimer();
                requestWakeLock();
                if (iosVideoWake) iosVideoWake.play().catch(()=>{});
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timeLeft = 60;
            updateProgressBar();
            if (isPlaying) startTimer();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                updateProgressBar();
                if (timeLeft <= 0) nextSlide();
            }, 1000);
        }

        function updateProgressBar() {
            const percentage = ((60 - timeLeft) / 60) * 100;
            progressBar.style.width = `${percentage}%`;
        }

        // Startknappen som låser upp iOS videofunktion
        startBtn.addEventListener('click', () => {
            overlay.style.display = 'none'; // Dölj startskärmen
            setupIOSWakeVideo();           // Aktivera videoloopen för iOS Safari
            requestWakeLock();             // Aktivera standard-Wakelock
            updateSlider();                // Starta bildspelet
        });

        nextBtn.addEventListener('click', nextSlide);
        prevBtn.addEventListener('click', prevSlide);
        playPauseBtn.addEventListener('click', togglePlayPause);
    </script>
</body>
</html>
